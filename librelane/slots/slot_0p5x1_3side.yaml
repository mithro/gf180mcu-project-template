# Floorplanning
# Half-sized 1x1 slot with the EAST edge as a bare cut edge (no pads).
# Pad spacing/locations match the WEST half of slot_1x1.yaml as closely as
# LibreLane's auto-distribution allows (same pad count per unit length on
# each populated edge).
FP_SIZING: absolute
# Half width of slot_1x1: 3932 / 2 = 1966
DIE_AREA: [0, 0, 1966, 5122]
# All edges use 442um margin: matches slot_1x1, and keeps the CORE_AREA
# boundary outside the 355um corner cells on the bare east edge to avoid
# OpenROAD inserting PHY_EDGE_ROW endcap cells with disconnected M1 power
# pins (PSM-0069). East margin = DIE_AREA - 1524 = 442um.
CORE_AREA: [442, 442, 1524, 4680]

VERILOG_DEFINES: ["SLOT_0P5X1_3SIDE"]

# Partial padring (3-sided): use partial PDN script
PDN_CFG: dir::pdn_partial.tcl

# Specify the pad instances for the padring.
# Pad indices are renumbered sequentially within this config so that the RTL
# generate-loop (i = 0 .. NUM_*_PADS-1) matches the placed cells exactly.
# Physical layout corresponds to the WEST half of slot_1x1's padring.

# PAD_SOUTH: west half of slot_1x1 PAD_SOUTH (clk/rst + 6 bidir + 1 dvss).
PAD_SOUTH: [
    clk_pad,
    rst_n_pad,

    "bidir\\[0\\].pad",
    "bidir\\[1\\].pad",
    "bidir\\[2\\].pad",
    "bidir\\[3\\].pad",
    "bidir\\[4\\].pad",
    "bidir\\[5\\].pad",

    "dvss_pads\\[0\\].pad"
]

# PAD_EAST: empty -- this is the bare cut edge.
PAD_EAST: []

# PAD_NORTH: west half of slot_1x1 PAD_NORTH (1 dvss + 8 bidir) plus 2 analog
# pads at the west end (analog pads from slot_1x1 originally lived at the east
# end of north, which is now the bare cut edge -- they are relocated here so
# the RTL's NUM_ANALOG_PADS can stay non-zero, avoiding a [-1:0] port range).
# List is in east->west order (LibreLane reverses this edge).
PAD_NORTH: [
    "dvss_pads\\[1\\].pad",

    "bidir\\[13\\].pad",
    "bidir\\[12\\].pad",
    "bidir\\[11\\].pad",
    "bidir\\[10\\].pad",
    "bidir\\[9\\].pad",
    "bidir\\[8\\].pad",
    "bidir\\[7\\].pad",
    "bidir\\[6\\].pad",

    "analog\\[1\\].pad",
    "analog\\[0\\].pad"
]

# PAD_WEST: full copy of slot_1x1 PAD_WEST (12 inputs + 4 dvdd + 4 dvss).
# Indices renumbered to match the per-config RTL pad counts.
PAD_WEST: [
    "dvdd_pads\\[3\\].pad",
    "dvss_pads\\[5\\].pad",
    "dvdd_pads\\[2\\].pad",
    "dvss_pads\\[4\\].pad",

    "inputs\\[11\\].pad",
    "inputs\\[10\\].pad",
    "inputs\\[9\\].pad",
    "inputs\\[8\\].pad",
    "inputs\\[7\\].pad",
    "inputs\\[6\\].pad",

    "dvdd_pads\\[1\\].pad",
    "dvss_pads\\[3\\].pad",

    "inputs\\[5\\].pad",
    "inputs\\[4\\].pad",
    "inputs\\[3\\].pad",
    "inputs\\[2\\].pad",

    "dvdd_pads\\[0\\].pad",
    "dvss_pads\\[2\\].pad",

    "inputs\\[1\\].pad",
    "inputs\\[0\\].pad"
]
